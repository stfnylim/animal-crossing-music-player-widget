<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NookOffice Embed</title>
    <meta name="description" content="A GitHub Pages-ready NookOffice-style focus widget for Notion embeds.">
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div id="light-switch" aria-label="Toggle dim light" role="button" tabindex="0">
      <div class="rope"></div>
      <div class="knob">o</div>
    </div>
    <div id="film"></div>

    <main>
      <section class="widget" aria-label="NookOffice focus widget">
        <div class="scene">
          <img id="feed" src="./video-feed/bg_4.gif" alt="Cozy Animal Crossing room scene">
          <div class="dates" aria-live="polite">
            <p id="locale-date"></p>
            <p id="locale-time"></p>
          </div>
        </div>

        <div class="player-controls">
          <div class="hidden-player" aria-hidden="true">
            <div id="music-player"></div>
            <div id="rain-player"></div>
          </div>

          <div class="ctrl-wrapper" aria-label="Audio controls">
            <button class="icon-button" id="pause" type="button" title="Pause">
              <img src="./player-controls/pause.svg" alt="">
            </button>
            <button class="icon-button" id="play" type="button" title="Play">
              <img src="./player-controls/play.svg" alt="">
            </button>
            <button class="icon-button" id="refresh" type="button" title="Shuffle scene">
              <img src="./player-controls/refresh.svg" alt="">
            </button>
            <button class="icon-button" id="layerRain" type="button" title="Toggle rain">
              <img src="./player-controls/rain.svg" alt="">
            </button>
          </div>

          <p id="feedback">Press Play to start.</p>

          <label class="volume-control" for="range">
            <span>Volume</span>
            <input type="range" min="0" max="100" value="85" step="5" autocomplete="off" id="range">
          </label>
        </div>

        <div class="todo-container trigger" id="todo">
          <button class="pulley" id="pulley" type="button" aria-label="Toggle tasks"></button>
          <div class="content" id="tasks">
            <ul id="listOfItemsID" class="items" aria-label="Tasks"></ul>
            <form id="formToAddItemsID" class="addItems" autocomplete="off">
              <input type="text" name="item" placeholder="Type task.." required>
              <button type="submit">Create</button>
            </form>
            <div class="todo-btm">
              <div class="selectTimer" id="selectTimerContainer">
                <div class="demo-preview" id="progBarContainer">
                  <div class="txt">
                    <span class="time" id="current">00:00</span>
                    <span class="divider">&nbsp;/&nbsp;</span>
                    <span class="time" id="end">00:00</span>
                  </div>
                  <div class="progress progress-striped active">
                    <div class="progress-bar" id="progressBar" data-end="0"></div>
                  </div>
                </div>
                <select name="selectTimer" class="select" id="selectTimer" autocomplete="off">
                  <option selected disabled hidden id="timerFeed">Start a timer</option>
                  <option value="5">5 Minutes</option>
                  <option value="15">15 Minutes</option>
                  <option value="30">30 Minutes</option>
                </select>
                <audio src="./timer.wav" id="soundCue" preload="auto"></audio>
              </div>
              <p class="credit">
                Inspired by NookOffice. Patch-ready for GitHub Pages and Notion embeds.
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
